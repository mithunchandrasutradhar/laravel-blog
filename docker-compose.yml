version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: blog_app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - .:/var/www
      - ./docker/php/php.ini:/usr/local/etc/php/conf.d/custom.ini
    networks:
      - blog_network
    depends_on:
      - mysql
      - redis
    environment:
      - APP_ENV=${APP_ENV:-production}

  nginx:
    image: nginx:1.25-alpine
    container_name: blog_nginx
    restart: unless-stopped
    ports:
      - "${NGINX_PORT:-80}:80"
      - "${NGINX_SSL_PORT:-443}:443"
    volumes:
      - .:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./docker/ssl:/etc/nginx/ssl
    networks:
      - blog_network
    depends_on:
      - app

  mysql:
    image: mysql:8.0
    container_name: blog_mysql
    restart: unless-stopped
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-rootpassword}
      MYSQL_DATABASE: ${DB_DATABASE:-blog}
      MYSQL_USER: ${DB_USERNAME:-blog}
      MYSQL_PASSWORD: ${DB_PASSWORD:-blogpassword}
    volumes:
      - blog_mysql_data:/var/lib/mysql
      - ./docker/mysql/my.cnf:/etc/mysql/conf.d/my.cnf
    networks:
      - blog_network
    command: --default-authentication-plugin=mysql_native_password
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci

  redis:
    image: redis:7.2-alpine
    container_name: blog_redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - blog_redis_data:/data
    networks:
      - blog_network
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru

  phpmyadmin:
    image: phpmyadmin/phpmyadmin:latest
    container_name: blog_phpmyadmin
    restart: unless-stopped
    ports:
      - "${PMA_PORT:-8080}:80"
    environment:
      PMA_HOST: mysql
      PMA_USER: ${DB_USERNAME:-blog}
      PMA_PASSWORD: ${DB_PASSWORD:-blogpassword}
    networks:
      - blog_network
    depends_on:
      - mysql
    profiles:
      - tools

networks:
  blog_network:
    driver: bridge

volumes:
  blog_mysql_data:
    driver: local
  blog_redis_data:
    driver: local
